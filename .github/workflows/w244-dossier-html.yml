# W244 wave 53 — Dossier HTML deterministic build gate.
#
# Whenever the underlying dossier JSON files change (Industry-First,
# All-Kernels, Benchmark), the corresponding rendered HTML page must
# rebuild byte-identical. This gate:
#
#   1. Rebuilds `INDUSTRY_FIRST_DOSSIER.html` (89-card IF dashboard)
#   2. Rebuilds `REGULATOR_PORTAL.html` (3-tab unified portal)
#   3. Verifies that the rebuild matches the committed copy in git
#      (drift detector — auditors trust the page Merkle only if the
#      committed file = freshly rebuilt file).
#   4. Runs the structure tests for both HTML pages.
#
# Fails CI if:
#   * Either rebuild produces drift vs. committed HTML
#   * Any structure / Merkle / card-count test fails
#
# This pairs with `w244-kernel-attest.yml` which already verifies the
# JSON sources rebuild byte-stable.

name: w244-dossier-html

on:
  push:
    branches: [main]
    paths:
      - 'tools/build_industry_firsts_html.py'
      - 'tools/build_regulator_portal.py'
      - 'tools/build_closed_form_portfolio_html.py'
      - 'tools/build_showcase_game_html.py'
      - 'tools/tests/test_w244_industry_firsts_html.py'
      - 'tools/tests/test_w244_regulator_portal.py'
      - 'tools/tests/test_w244_closed_form_portfolio_html.py'
      - 'tools/tests/test_w244_showcase_game_html.py'
      - 'reports/dossier/INDUSTRY_FIRST_DOSSIER.json'
      - 'reports/dossier/INDUSTRY_FIRST_DOSSIER.html'
      - 'reports/dossier/REGULATOR_PORTAL.html'
      - 'reports/dossier/CLOSED_FORM_PORTFOLIO_100.json'
      - 'reports/dossier/CLOSED_FORM_PORTFOLIO.html'
      - 'reports/dossier/showcase_game.html'
      - 'reports/acceptance/W244_ALL_KERNELS.json'
      - 'reports/acceptance/W244_BENCHMARK_DOSSIER.json'
      - 'reports/acceptance/SHOWCASE_GAME_KERNEL.json'
      - '.github/workflows/w244-dossier-html.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tools/build_industry_firsts_html.py'
      - 'tools/build_regulator_portal.py'
      - 'tools/build_closed_form_portfolio_html.py'
      - 'tools/build_showcase_game_html.py'
      - 'tools/tests/test_w244_industry_firsts_html.py'
      - 'tools/tests/test_w244_regulator_portal.py'
      - 'tools/tests/test_w244_closed_form_portfolio_html.py'
      - 'tools/tests/test_w244_showcase_game_html.py'
      - 'reports/dossier/INDUSTRY_FIRST_DOSSIER.json'
      - 'reports/dossier/INDUSTRY_FIRST_DOSSIER.html'
      - 'reports/dossier/REGULATOR_PORTAL.html'
      - 'reports/dossier/CLOSED_FORM_PORTFOLIO_100.json'
      - 'reports/dossier/CLOSED_FORM_PORTFOLIO.html'
      - 'reports/dossier/showcase_game.html'
      - 'reports/acceptance/W244_ALL_KERNELS.json'
      - 'reports/acceptance/W244_BENCHMARK_DOSSIER.json'
      - 'reports/acceptance/SHOWCASE_GAME_KERNEL.json'
      - '.github/workflows/w244-dossier-html.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dossier-html-attest:
    name: Dossier HTML byte-stable + structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run dossier HTML structure tests
        run: |
          python -m pytest \
            tools/tests/test_w244_industry_firsts_html.py \
            tools/tests/test_w244_regulator_portal.py \
            tools/tests/test_w244_closed_form_portfolio_html.py \
            tools/tests/test_w244_showcase_game_html.py \
            -v --tb=short

      - name: Snapshot committed HTML
        run: |
          cp reports/dossier/INDUSTRY_FIRST_DOSSIER.html /tmp/ifs-committed.html
          cp reports/dossier/REGULATOR_PORTAL.html /tmp/portal-committed.html
          cp reports/dossier/CLOSED_FORM_PORTFOLIO.html /tmp/cf-committed.html
          cp reports/dossier/showcase_game.html /tmp/showcase-committed.html

      - name: Rebuild Industry-First HTML
        run: |
          python3 tools/build_industry_firsts_html.py

      - name: Rebuild Regulator Portal
        run: |
          python3 tools/build_regulator_portal.py

      - name: Rebuild Closed-Form Portfolio HTML
        run: |
          python3 tools/build_closed_form_portfolio_html.py

      - name: Rebuild Showcase Game HTML
        run: |
          python3 tools/build_showcase_game_html.py

      - name: Verify Industry-First HTML byte-identical
        run: |
          if ! diff -q /tmp/ifs-committed.html \
               reports/dossier/INDUSTRY_FIRST_DOSSIER.html; then
            echo "::error::INDUSTRY_FIRST_DOSSIER.html DRIFT — committed != fresh rebuild"
            echo "::error::Run \`make dossier-ifs-html\` and commit the result."
            diff /tmp/ifs-committed.html \
                 reports/dossier/INDUSTRY_FIRST_DOSSIER.html | head -30
            exit 1
          fi
          echo "✓ INDUSTRY_FIRST_DOSSIER.html: rebuild byte-identical"

      - name: Verify Regulator Portal byte-identical
        run: |
          if ! diff -q /tmp/portal-committed.html \
               reports/dossier/REGULATOR_PORTAL.html; then
            echo "::error::REGULATOR_PORTAL.html DRIFT — committed != fresh rebuild"
            echo "::error::Run \`make dossier-portal\` and commit the result."
            diff /tmp/portal-committed.html \
                 reports/dossier/REGULATOR_PORTAL.html | head -30
            exit 1
          fi
          echo "✓ REGULATOR_PORTAL.html: rebuild byte-identical"

      - name: Verify Closed-Form Portfolio HTML byte-identical
        run: |
          if ! diff -q /tmp/cf-committed.html \
               reports/dossier/CLOSED_FORM_PORTFOLIO.html; then
            echo "::error::CLOSED_FORM_PORTFOLIO.html DRIFT — committed != fresh rebuild"
            echo "::error::Run \`make dossier-portfolio-html\` and commit the result."
            diff /tmp/cf-committed.html \
                 reports/dossier/CLOSED_FORM_PORTFOLIO.html | head -30
            exit 1
          fi
          echo "✓ CLOSED_FORM_PORTFOLIO.html: rebuild byte-identical"

      - name: Verify Showcase Game HTML byte-identical
        run: |
          if ! diff -q /tmp/showcase-committed.html \
               reports/dossier/showcase_game.html; then
            echo "::error::showcase_game.html DRIFT — committed != fresh rebuild"
            echo "::error::Run \`make dossier-showcase\` and commit the result."
            diff /tmp/showcase-committed.html \
                 reports/dossier/showcase_game.html | head -30
            exit 1
          fi
          echo "✓ showcase_game.html: rebuild byte-identical"

      - name: Emit page Merkle summary
        run: |
          IFS_HASH=$(sha256sum reports/dossier/INDUSTRY_FIRST_DOSSIER.html \
                     | cut -d' ' -f1)
          PORTAL_HASH=$(sha256sum reports/dossier/REGULATOR_PORTAL.html \
                        | cut -d' ' -f1)
          CF_HASH=$(sha256sum reports/dossier/CLOSED_FORM_PORTFOLIO.html \
                    | cut -d' ' -f1)
          SHOWCASE_HASH=$(sha256sum reports/dossier/showcase_game.html \
                          | cut -d' ' -f1)
          echo "Industry-First HTML SHA-256: $IFS_HASH"
          echo "Regulator Portal HTML SHA-256: $PORTAL_HASH"
          echo "Closed-Form Portfolio SHA-256: $CF_HASH"
          echo "Showcase Game SHA-256:         $SHOWCASE_HASH"
          echo "## W244 Dossier HTML Merkle Roots" >> $GITHUB_STEP_SUMMARY
          echo "- IF Dashboard:        \`$IFS_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "- Regulator Portal:    \`$PORTAL_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "- CF Portfolio:        \`$CF_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "- Showcase Game:       \`$SHOWCASE_HASH\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload portal artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w244-dossier-html
          path: |
            reports/dossier/INDUSTRY_FIRST_DOSSIER.html
            reports/dossier/REGULATOR_PORTAL.html
            reports/dossier/CLOSED_FORM_PORTFOLIO.html
            reports/dossier/showcase_game.html
          if-no-files-found: error
