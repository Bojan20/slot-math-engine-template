      - name: Cascade Multiplier Chain acceptance (6/6 configs × 100K spins, Wave 121/122)
        run: npm run cascade-multiplier-chain-acceptance
      - name: Mega Symbol Multi-Cell Expansion acceptance (6/6 configs × 100K spins, Wave 123/124)
        run: npm run mega-symbol-expansion-acceptance
      - name: Bi-Directional Line Pay acceptance (6/6 configs × 100K spins, Wave 125/126)
