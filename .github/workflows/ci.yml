      - name: Free Spins Buy Tier Trade-Off acceptance (6/6 configs × 50K MC trials, Wave 130/131)
        run: npm run free-spins-buy-tier-tradeoff-acceptance
      - name: Multi-Level Wild Markov acceptance (6/6 configs × 100K spins, Wave 132/133)
