name: PAR Library Portfolio Sweep

# Runs `slot-math batch --mc-spins N` against the full PAR library on every
# push to main, every PR, weekly schedule, and manual dispatch.
#
# Outputs:
#   - Markdown dashboard artifact (uploaded on every run)
#   - PR comment with current dashboard + diff vs main (PRs only)
#   - Job summary embedding the dashboard inline (GitHub UI)
#   - Red CI on any composer/MC regression (exit 1 from `slot-math batch`)
#
# Why a dedicated workflow:
#   The existing `slot-math-ci.yml` covers tools/ + games/ tests. This new
#   sweep is the *portfolio* gate — does every reference game still pass
#   composer parity AND Monte-Carlo convergence end-to-end? Rust binary is
#   built fresh per run so the MC engine matches the source tree.

on:
  push:
    branches: [main]
    paths:
      - "tools/par_kernels/**"
      - "rust-sim/src/bin/mc_extended_real.rs"
      - "rust-sim/src/bin/mc_runtime_real.rs"
      - "rust-sim/Cargo.toml"
      - "reports/par-library/**"
      - ".github/workflows/portfolio-sweep.yml"
  pull_request:
    branches: [main]
    paths:
      - "tools/par_kernels/**"
      - "rust-sim/src/bin/mc_extended_real.rs"
      - "rust-sim/src/bin/mc_runtime_real.rs"
      - "rust-sim/Cargo.toml"
      - "reports/par-library/**"
      - ".github/workflows/portfolio-sweep.yml"
  schedule:
    # Weekly: Monday 06:00 UTC. Catches drift from upstream Rust/Python
    # toolchain updates even when nobody touched the math.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      mc_spins:
        description: "Monte Carlo rounds per game (default 1_000_000)"
        required: false
        default: "1000000"
        type: string
      tolerance_bps:
        description: "Composer parity tolerance (bps)"
        required: false
        default: "50"
        type: string

concurrency:
  # Cancel superseded in-flight runs on the same ref.
  group: portfolio-sweep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # for PR comment posting

jobs:
  sweep:
    name: Sweep PAR library — composer + MC convergence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      mc_spins: ${{ steps.params.outputs.mc_spins }}
      tolerance_bps: ${{ steps.params.outputs.tolerance_bps }}
      sweep_status: ${{ steps.batch.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        # We do NOT specify a channel here — `cargo build` reads
        # `./rust-toolchain.toml` and triggers rustup auto-install of
        # the pinned 1.83.0 toolchain. Specifying @stable conflicts
        # with the pinned channel (clippy binary overlap).
        run: |
          rustup show active-toolchain || rustup show
          rustc --version
          cargo --version

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-portfolio-${{ hashFiles('Cargo.lock', 'rust-sim/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-portfolio-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Resolve sweep parameters
        id: params
        run: |
          mc_spins="${{ inputs.mc_spins || '1000000' }}"
          tolerance_bps="${{ inputs.tolerance_bps || '50' }}"
          echo "mc_spins=$mc_spins"        >> "$GITHUB_OUTPUT"
          echo "tolerance_bps=$tolerance_bps" >> "$GITHUB_OUTPUT"
          echo "::notice::Sweep parameters: --mc-spins $mc_spins --tolerance-bps $tolerance_bps"

      - name: Build Rust MC binaries (release)
        # Use workspace root build so binaries land at target/release/
        # — that's where mc_extended_rust.py + mc_runtime_rust.py look.
        run: |
          cargo build --release --bin mc_extended_real --bin mc_runtime_real
          ls -la target/release/mc_extended_real target/release/mc_runtime_real

      - name: Smoke-test Rust binaries are callable
        run: |
          python -c "
          from tools.par_kernels.mc_extended_rust import find_extended_binary
          from tools.par_kernels.mc_runtime_rust   import find_binary as find_wrath_binary
          ext = find_extended_binary()
          wrath = find_wrath_binary()
          assert ext is not None,   'mc_extended_real not found'
          assert wrath is not None, 'mc_runtime_real not found'
          print('  mc_extended_real:', ext)
          print('  mc_runtime_real :', wrath)
          "

      - name: Run portfolio sweep
        id: batch
        run: |
          set +e
          mkdir -p reports/portfolio
          python -m tools.par_kernels.cli batch \
              --mc-spins "${{ steps.params.outputs.mc_spins }}" \
              --tolerance-bps "${{ steps.params.outputs.tolerance_bps }}" \
              --out   reports/portfolio/dashboard.md \
              --bench reports/portfolio/bench.json
          ec=$?
          set -e
          echo "status=$ec" >> "$GITHUB_OUTPUT"
          if [ $ec -eq 0 ]; then
            echo "::notice::Portfolio sweep PASSED — all games converge."
          else
            echo "::warning::Portfolio sweep FAILED (exit $ec) — see dashboard + bench artifacts."
          fi
          # Always emit dashboard + compact bench summary to job summary
          {
            echo "## Portfolio Sweep Dashboard"
            cat reports/portfolio/dashboard.md
            echo ""
            echo "### Bench summary"
            echo ""
            echo '```json'
            python -c "import json; d=json.load(open('reports/portfolio/bench.json')); print(json.dumps({k:d[k] for k in ['schema_version','generated_at','wallclock_secs','config','summary']}, indent=2))"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dashboard-${{ github.sha }}
          path: reports/portfolio/
          retention-days: 90

      # ─────────────────────────────────────────────────────────────────
      # Main-push only: pin this run's bench.json into the long-running
      # portfolio-history ledger AND upload the entire ledger as a
      # separate artifact. Idempotent (content_sha-keyed) — re-runs of
      # the same SHA do not duplicate entries.
      # ─────────────────────────────────────────────────────────────────
      - name: Pin bench to portfolio-history ledger (main only)
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          steps.batch.outputs.status == '0'
        run: |
          python -m tools.par_kernels.cli bench-pin \
              reports/portfolio/bench.json \
              --pin-dir reports/bench/portfolio-history \
              --git-sha "${{ github.sha }}"
          # Render trend summary into job summary
          {
            echo ""
            echo "## Portfolio Trend (across pinned history)"
            python -m tools.par_kernels.cli bench-trend \
                --pin-dir reports/bench/portfolio-history \
                --last-n 20
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload portfolio-history ledger artifact (main only)
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          steps.batch.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-history-ledger
          path: reports/bench/portfolio-history/
          # 90 = repo cap (workflow tried 365, got clamped + warning).
          # The ledger keeps growing across runs anyway since it's
          # idempotent — even with 90-day artifact, INDEX.json carries
          # the entire history forward when re-downloaded as baseline.
          retention-days: 90

      # ─────────────────────────────────────────────────────────────────
      # PR-only: fetch latest main artifact as baseline, compute diff.
      # Baseline absence is NOT an error (first run on a new repo, or
      # main has no artifact yet) — we just fall back to the full
      # dashboard in the PR comment.
      # ─────────────────────────────────────────────────────────────────
      - name: Fetch baseline bench.json from latest main run
        id: baseline
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p reports/portfolio/baseline
          set +e
          # Prefer the cumulative portfolio-history ledger artifact —
          # it survives even when the single-run dashboard artifact has
          # been GC'd, and gives bench-trend something to work with.
          # Fall back to per-run dashboard artifact if ledger missing.
          base_run_id=$(gh run list \
              --workflow="portfolio-sweep.yml" \
              --branch=main \
              --status=success \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId')
          set -e
          if [ -z "$base_run_id" ]; then
            echo "::notice::No baseline run found on main — skipping diff."
            echo "have_baseline=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::notice::Baseline run on main: $base_run_id"
          baseline_json=""
          # First try: ledger artifact (preferred)
          if gh run download "$base_run_id" \
                --dir reports/portfolio/baseline-ledger \
                --name "portfolio-history-ledger" 2>/dev/null; then
            # Index sorted by ts; last entry = newest pinned baseline.
            last_filename=$(python -c "import json,sys; idx=json.load(open('reports/portfolio/baseline-ledger/INDEX.json')); print(idx[-1]['filename'] if idx else '')" 2>/dev/null || true)
            if [ -n "$last_filename" ]; then
              baseline_json="reports/portfolio/baseline-ledger/$last_filename"
              echo "::notice::Using ledger entry as baseline: $last_filename"
            fi
          fi
          # Fallback: per-run dashboard artifact
          if [ -z "$baseline_json" ]; then
            gh run download "$base_run_id" \
                --dir reports/portfolio/baseline \
                --pattern "portfolio-dashboard-*" || {
              echo "::warning::Failed to download baseline artifact"
              echo "have_baseline=false" >> "$GITHUB_OUTPUT"
              exit 0
            }
            baseline_json=$(find reports/portfolio/baseline -name "bench.json" | head -1)
          fi
          if [ -z "$baseline_json" ] || [ ! -f "$baseline_json" ]; then
            echo "::warning::No baseline bench.json found in any artifact"
            echo "have_baseline=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cp "$baseline_json" reports/portfolio/baseline/bench.json
          echo "have_baseline=true" >> "$GITHUB_OUTPUT"
          echo "baseline_run_id=$base_run_id" >> "$GITHUB_OUTPUT"
          echo "::notice::Baseline bench.json staged from $baseline_json"

      - name: Compute regression diff (current vs baseline)
        id: diff
        if: |
          github.event_name == 'pull_request' &&
          steps.baseline.outputs.have_baseline == 'true'
        run: |
          set +e
          python -m tools.par_kernels.cli bench-diff \
              reports/portfolio/bench.json \
              reports/portfolio/baseline/bench.json \
              --out reports/portfolio/diff.md \
              --fail-on-regression
          diff_ec=$?
          set -e
          echo "exit_code=$diff_ec" >> "$GITHUB_OUTPUT"
          if [ $diff_ec -eq 0 ]; then
            echo "::notice::Bench-diff: no regression vs main."
          else
            echo "::warning::Bench-diff: REGRESSION detected vs main."
          fi

      - name: Post PR comment (diff if baseline available, else dashboard)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const have_baseline = '${{ steps.baseline.outputs.have_baseline }}' === 'true';
            const diff_exists = fs.existsSync('reports/portfolio/diff.md');
            const dashboard_exists = fs.existsSync('reports/portfolio/dashboard.md');

            const status = '${{ steps.batch.outputs.status }}';
            const sweep_emoji = status === '0' ? '✅' : '🔴';
            const sweep_verdict = status === '0' ? 'PASSED' : 'FAILED';

            // Primary block: regression diff (compact, signal-focused)
            const diff_md = (have_baseline && diff_exists)
              ? fs.readFileSync('reports/portfolio/diff.md', 'utf8')
              : '_No baseline available — showing full dashboard below._';

            // Secondary block: full dashboard (collapsed)
            const dashboard_md = dashboard_exists
              ? fs.readFileSync('reports/portfolio/dashboard.md', 'utf8')
              : '(dashboard missing — see workflow logs)';

            const baseline_link = have_baseline
              ? `[run ${{ steps.baseline.outputs.baseline_run_id || '0' }}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ steps.baseline.outputs.baseline_run_id || '0' }})`
              : '_(none)_';

            const body = [
              `## ${sweep_emoji} Portfolio Sweep — ${sweep_verdict}`,
              '',
              `**Current SHA:** \`${context.sha.slice(0,7)}\` · `,
              `**MC spins/game:** ${{ steps.params.outputs.mc_spins }} · `,
              `**Tolerance:** ${{ steps.params.outputs.tolerance_bps }} bps · `,
              `**Baseline:** ${baseline_link}`,
              '',
              diff_md,
              '',
              '<details><summary>Click to expand full dashboard</summary>',
              '',
              dashboard_md,
              '',
              '</details>',
              '',
              `_Workflow: [portfolio-sweep](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
            ].join('\n');

            // Find any existing portfolio comment from this bot to update,
            // otherwise create a new one. Avoids spam on every push.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body && c.body.includes('Portfolio Sweep')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing portfolio comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new portfolio comment');
            }

      - name: Fail job on red sweep or regression
        # Sweep failure (composer/MC) → always fatal.
        # Regression diff failure → fatal only on PR (don't break main pushes
        # since main is the new baseline and we already gated via batch).
        if: |
          steps.batch.outputs.status != '0' ||
          (github.event_name == 'pull_request' &&
           steps.diff.outputs.exit_code != '' &&
           steps.diff.outputs.exit_code != '0')
        run: |
          sweep_ec="${{ steps.batch.outputs.status }}"
          diff_ec="${{ steps.diff.outputs.exit_code }}"
          if [ "$sweep_ec" != "0" ]; then
            echo "::error::Portfolio sweep returned exit $sweep_ec — check dashboard artifact"
          fi
          if [ -n "$diff_ec" ] && [ "$diff_ec" != "0" ]; then
            echo "::error::Bench-diff returned exit $diff_ec — regression vs main baseline"
          fi
          exit 1
