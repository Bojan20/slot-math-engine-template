# CORTI 200.6-DEVOPS — full-stack acceptance.
#
# Runs the engine + every mini-app suite + Vite builds + Docker smoke
# + Playwright e2e on matrix(ubuntu, macos-arm64).

name: full-stack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  engine:
    name: Engine · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  studio:
    name: Studio · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd web/studio && npm ci
      - run: npm run studio:typecheck
      - run: npm run studio:test

  server:
    name: Server · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run server:typecheck
      - run: npm run server:test

  operator-regulator:
    name: Operator+Regulator · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd web/operator && npm ci
      - run: cd web/regulator && npm ci
      - run: npm run operator:typecheck
      - run: npm run operator:test
      - run: npm run regulator:typecheck
      - run: npm run regulator:test

  vite-builds:
    name: Vite builds · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd web/studio && npm ci && npm run build
      - run: cd web/operator && npm ci && npm run build
      - run: cd web/regulator && npm ci && npm run build

  docker:
    name: Docker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        run: docker build -f Dockerfile.server -t sme/server:ci .
      - name: Build studio image
        run: docker build -f Dockerfile.studio -t sme/studio:ci .
      - name: Build operator image
        run: docker build -f Dockerfile.operator -t sme/operator:ci .
      - name: Build regulator image
        run: docker build -f Dockerfile.regulator -t sme/regulator:ci .

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd web/studio && npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run studio:e2e

  audit:
    # CORTI W204-AUDIT — performance + WCAG + browser-compat hardening evidence.
    # Static mode runs without launching browsers. Fails the build if the
    # Studio Lighthouse-style score drops below 70 or any app shows
    # Critical/Serious WCAG findings.
    name: Audit · perf + a11y + browser-compat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Performance audit (static)
        run: npm run perf:audit
      - name: Accessibility audit (static)
        run: npm run a11y:audit
      - name: Browser-compat audit (static)
        run: npm run browser:audit
      - name: Gate on Studio perf score ≥ 70
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = path.join('reports', 'performance');
            const file = fs.readdirSync(dir).filter(f => f.endsWith('.json')).sort().pop();
            const data = JSON.parse(fs.readFileSync(path.join(dir, file), 'utf8'));
            const studio = data.results.find(r => r.name === 'studio');
            if (!studio || studio.score < 70) {
              console.error('FAIL: studio score', studio?.score, '< 70');
              process.exit(1);
            }
            console.log('OK: studio score', studio.score);
          "
      - name: Gate on 0 Critical/Serious WCAG findings
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = path.join('reports', 'accessibility');
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            let bad = 0;
            for (const f of files) {
              const d = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              if (d.counts.Critical > 0 || d.counts.Serious > 0) {
                console.error('FAIL:', f, 'C=' + d.counts.Critical, 'S=' + d.counts.Serious);
                bad++;
              }
            }
            if (bad > 0) process.exit(1);
            console.log('OK: all apps have 0 Critical/Serious findings');
          "
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            reports/performance/
            reports/accessibility/
            reports/browser-compat/
          retention-days: 30
