# CORTI 200.6-DEVOPS — full-stack acceptance.
#
# Runs the engine + every mini-app suite + Vite builds + Docker smoke
# + Playwright e2e on matrix(ubuntu, macos-arm64).

name: full-stack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  engine:
    name: Engine · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  studio:
    name: Studio · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd web/studio && npm ci
      - run: npm run studio:typecheck
      - run: npm run studio:test

  server:
    name: Server · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run server:typecheck
      - run: npm run server:test

  operator-regulator:
    name: Operator+Regulator · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd web/operator && npm ci
      - run: cd web/regulator && npm ci
      - run: npm run operator:typecheck
      - run: npm run operator:test
      - run: npm run regulator:typecheck
      - run: npm run regulator:test

  vite-builds:
    name: Vite builds · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd web/studio && npm ci && npm run build
      - run: cd web/operator && npm ci && npm run build
      - run: cd web/regulator && npm ci && npm run build

  docker:
    name: Docker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        run: docker build -f Dockerfile.server -t sme/server:ci .
      - name: Build studio image
        run: docker build -f Dockerfile.studio -t sme/studio:ci .
      - name: Build operator image
        run: docker build -f Dockerfile.operator -t sme/operator:ci .
      - name: Build regulator image
        run: docker build -f Dockerfile.regulator -t sme/regulator:ci .

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd web/studio && npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run studio:e2e
