# W214 Faza 600.3 — Dependency review (per-PR, on lockfile/manifest change).
#
# Triggers only when a package*.json file is modified. Performs:
#   1. `npm audit --json` comparison (PR vs base) — diff dep tree
#   2. License gate — block any newly added non-permissive license
#      (GPL / AGPL / SSPL / BSL / CC-BY-NC).
#   3. CVE gate — block any newly added dep with HIGH+ CVE.
#   4. SBOM generation (CycloneDX 1.5) — uploaded as artifact.
#
# Posts a PR comment with the dep delta table.

name: dependency-review

on:
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "web/*/package.json"
      - "web/*/package-lock.json"
      - "sdk/package.json"
      - "sdk/package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dep-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run dep-review (PR)
        id: review_pr
        run: |
          set +e
          npm run -s security:dep-review
          echo "status=$?" >> "$GITHUB_OUTPUT"
          set -e
          cp reports/security/DEPENDENCY_REVIEW.json reports/security/dep-pr.json 2>/dev/null || true

      - name: Run dep-review (base)
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref || 'main' }}":refs/remotes/origin/base
          git worktree add --detach .pr-base origin/base
          cd .pr-base && npm ci --ignore-scripts && \
            (npm run -s security:dep-review || true) && \
            cp reports/security/DEPENDENCY_REVIEW.json ../reports/security/dep-base.json 2>/dev/null || true
        continue-on-error: true

      - name: Compute dep delta
        id: delta
        run: |
          node scripts/security/dep-delta.mjs \
            --pr reports/security/dep-pr.json \
            --base reports/security/dep-base.json \
            --out reports/security/dep-delta.md \
            --json reports/security/dep-delta.json

      - name: Generate SBOM (CycloneDX 1.5)
        run: npm run -s security:sbom

      - name: Upload SBOM + delta artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            reports/sbom/sbom-current.json
            reports/sbom/sbom-current.xml
            reports/security/dep-delta.md
            reports/security/dep-delta.json
          if-no-files-found: ignore
          retention-days: 90

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('reports/security/dep-delta.md', 'utf8');
            } catch {
              body = "No dependency delta available.";
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) =>
              c.body && c.body.startsWith('<!-- dep-review -->')
            );
            const fullBody = `<!-- dep-review -->\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Block on non-permissive license or new CVE
        run: |
          node -e "
            const d = JSON.parse(require('fs').readFileSync('reports/security/dep-delta.json','utf8'));
            if (d.blockers && d.blockers.length > 0) {
              console.error('::error::dependency-review BLOCKED:');
              for (const b of d.blockers) console.error('  - ' + b);
              process.exit(1);
            }
            console.log('dep-review OK — no blocking violations.');
          "
