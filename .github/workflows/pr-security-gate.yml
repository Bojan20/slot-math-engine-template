# W214 Faza 600.3 — PR security gate (continuous hardening, per-PR).
#
# Runs on every PR + push to a PR branch. Builds the full 11-category
# `security:audit` report on the PR branch, compares it against the
# baseline (latest snapshot on main), and posts a delta table as a PR
# comment.
#
# Blocking conditions:
#   - any category flipped PASS → FAIL on the PR branch
#   - any new WARN appears that wasn't present on the baseline
#
# Subset of pentest scenarios run here (skip slow ones — those run in
# the daily-security-audit workflow).
#
# Budget: ≤10 min on free GitHub Actions tier.

name: pr-security-gate

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-security-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: PR security gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Audit (PR branch)
        id: audit_pr
        run: |
          set +e
          npm run -s security:audit
          echo "status=$?" >> "$GITHUB_OUTPUT"
          set -e
          cp reports/security/audit.json reports/security/audit-pr.json

      - name: Checkout baseline (main)
        run: |
          git fetch origin main:refs/remotes/origin/main
          git stash -u || true
          git checkout origin/main -- reports/security/baseline.json 2>/dev/null || \
            echo "{}" > reports/security/baseline.json

      - name: Fast pentest subset (PR-relevant only)
        id: pentest
        run: |
          set +e
          node scripts/security/pentest/pentest-cross-tenant.mjs
          node scripts/security/pentest/pentest-jwt-forge.mjs
          node scripts/security/pentest/pentest-sql-injection.mjs
          echo "status=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Compute delta
        id: delta
        run: |
          node scripts/security/pr-delta.mjs \
            --pr reports/security/audit-pr.json \
            --baseline reports/security/baseline.json \
            --out reports/security/pr-delta.md
          echo "regression=$(node -e "const d=JSON.parse(require('fs').readFileSync('reports/security/pr-delta.json','utf8'));console.log(d.regression?'true':'false');")" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('reports/security/pr-delta.md', 'utf8');
            } catch {
              body = "PR security delta unavailable.";
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) =>
              c.body && c.body.startsWith('<!-- pr-security-gate -->')
            );
            const fullBody = `<!-- pr-security-gate -->\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Fail on regression
        if: |
          steps.audit_pr.outputs.status != '0'
          || steps.pentest.outputs.status != '0'
          || steps.delta.outputs.regression == 'true'
        run: |
          echo "::error::PR introduces a security regression — see PR comment."
          exit 1
