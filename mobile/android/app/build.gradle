// CORTI W207-MOBILE — Android Studio module build script (placeholder).
//
// The actual project is generated by `npx cap add android` against
// `mobile/capacitor.config.json`. This file is checked in so that
// reviewers can see the target SDK / dependency set without having
// the full Android toolchain installed.

apply plugin: 'com.android.application'

android {
    namespace "com.vanvinkl.slotstudio"
    compileSdk 34

    defaultConfig {
        applicationId "com.vanvinkl.slotstudio"
        minSdkVersion 24       // Android 7.0 — covers >97% of active devices
        targetSdkVersion 34
        versionCode 1
        versionName "0.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Disable Vector-drawable PNG generation; we ship SVG via the WebView.
        vectorDrawables.useSupportLibrary = true
        // Capacitor uses 4-byte unicode aaptOptions in resource files.
        aaptOptions {
            noCompress 'webp', 'svg'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        resources {
            excludes += ['META-INF/LICENSE*', 'META-INF/NOTICE*']
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "androidx.coordinatorlayout:coordinatorlayout:1.2.0"
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation project(':capacitor-android')

    // Capacitor plugins (matched to capacitor.config.json)
    implementation project(':capacitor-haptics')
    implementation project(':capacitor-share')
    implementation project(':capacitor-status-bar')
    implementation project(':capacitor-splash-screen')
    implementation project(':capacitor-keyboard')
    implementation project(':capacitor-filesystem')

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}

apply from: 'capacitor.build.gradle'
