id: aams
name: Agenzia delle Dogane e dei Monopoli (Italy, formerly AAMS)
rtp_range: [0.90, 0.99]
max_win_x: 50000
min_spin_duration_ms: 4000
max_stake_default: 1.0
prohibited_features:
