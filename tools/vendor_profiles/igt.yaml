# IGT (International Game Technology) PAR sheet profile.
#
# Calibrated on: games/fort-knox-wolf-run/raw/PAR_001|002.tsv
#   - 4×5 reels / 40 paylines
#   - Linear progressive (1:1 with bet, base odds 1-in-7.5M at min bet)
#   - Fort Knox Bonus (pick-bonus on top reel; 0.177 RTP contribution)
#   - Free Spins Bonus (Bonus-triple scatter → 5 FS @ 2× retrigger up to 255)
#
# Profile version 1 covers: meta · bet table · base paytable · scatter ·
# linear progressive · Fort Knox pick bonus · Bonus Summary.
#
# RESERVED for W4.3: reel strip parser (IGT uses per-reel "Reel N / Weights"
# stripe layout starting row 197 instead of L&W's "Base Game Reel Set: K"
# header blocks). The reel_sets section is intentionally absent; downstream
# `slot-sim` will need a per-reel-strip reader added.

vendor: igt
display_name: International Game Technology
profile_version: 1
game_name: Fort Knox Wolf Run

sheets:
  main_par: PAR_001
  summary: PAR_Summary
  paylines: Paylines

dimensions:
  reels: 5
  rows: 4
  paylines: 40
  left_to_right_only: true

meta:
  swid:     { row: 2, col: 2 }
  hold:     { row: 0, col: 12 }
  hit_freq: { row: 1, col: 12 }
  win_freq: { row: 2, col: 12 }

rtp_breakdown:
  base_game:        { row: 104, col: 9 }
  bonus:            { row: 105, col: 9 }
  base_plus_bonus:  { row: 106, col: 9 }

bet_table:
  row_range: [12, 36]
  mult_col: 1
  total_col: ~                 # not in the per-row IGT table
  max_liab_col: ~
  base_rtp_col: 2
  bonus_rtp_col: 3
  fort_knox_bonus_rtp_col: 4
  increment_col: 5
  total_rtp_col: 6
  progressive_odds_col: 7

paytable:
  row_range: [66, 99]
  combo_cols: [1, 6]            # cols 1..5 (5 reels)
  pays_col: 8
  pph_col: 7
  rtp_pct_col: 9
  marker_col: 0
  # Note: scatter line at row 100 (combo: --,Bonus,Bonus,Bonus,--) is parsed
  # too — the engine doesn't special-case "--" placeholders.

symbol_counts:
  row_range: [128, 140]
  name_col: 1
  reel_col_range: [2, 7]

features:
  - type: free_spins
    config:
      paytable_header_label: "Combination"
      paytable_header_col: 1
      combo_header_label: "Combination"
      combo_header_col: 1
      pays_substr: "Pays"
      combo_cols: [1, 6]
      pays_col: 8
      pph_col: 7
      rtp_pct_col: 9
      marker_col: 0
      max_rows: 60
      summary_header_substr: "Ave # Spins"
      summary_data_offset: 1
      summary_cols:
        avg_free_spins: 1
        single_spin_payback_pct: 2
        total_payback_pct: 3

  - type: linear_progressive
    config:
      progressive_odds_col: 7

  - type: fort_knox_pick_bonus
    config:
      section_label: "Fort Knox Bonus"
      section_label_col: 2
      rtp_label_col: 3
      rtp_value_col: 7
      max_search_rows: 800
      bet_table_fkb_rtp_col: 4
