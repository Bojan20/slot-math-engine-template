# IGT (International Game Technology) PAR sheet profile.
#
# Calibrated on: games/fort-knox-wolf-run/raw/PAR_001|002.tsv
#   - 4×5 reels / 40 paylines
#   - Linear progressive (1:1 with bet, base odds 1-in-7.5M at min bet)
#   - Fort Knox Bonus (pick-bonus on top reel; 0.177 RTP contribution)
#   - Free Spins Bonus (Bonus-triple scatter → 5 FS @ 2× retrigger up to 255)
#
# Profile version 1 covers: meta · bet table · base paytable · scatter ·
# linear progressive · Fort Knox pick bonus · Bonus Summary.
#
# Profile version 2 (W4.3a, 2026-05-25): per-reel strip parser using the
# `stripe` layout. IGT writes reel strips as a single section beginning at
# `Base Game Reel Strips` (row 197) and `Bonus Reel Strips` (row 322). The
# row immediately below the section header is a column header
# (`Reel 1 Weights Reel 2 Weights ...`); two rows below is per-stop data.
# Each reel pair occupies two adjacent columns (symbol + weight) starting at
# col 1. The strip section terminates at a `Total` row in col 0.

vendor: igt
display_name: International Game Technology
profile_version: 2
game_name: Fort Knox Wolf Run

sheets:
  main_par: PAR_001
  summary: PAR_Summary
  paylines: Paylines

dimensions:
  reels: 5
  rows: 4
  paylines: 40
  left_to_right_only: true

meta:
  swid:     { row: 2, col: 2 }
  hold:     { row: 0, col: 12 }
  hit_freq: { row: 1, col: 12 }
  win_freq: { row: 2, col: 12 }

rtp_breakdown:
  base_game:        { row: 104, col: 9 }
  bonus:            { row: 105, col: 9 }
  base_plus_bonus:  { row: 106, col: 9 }

bet_table:
  row_range: [12, 36]
  mult_col: 1
  total_col: ~                 # not in the per-row IGT table
  max_liab_col: ~
  base_rtp_col: 2
  bonus_rtp_col: 3
  fort_knox_bonus_rtp_col: 4
  increment_col: 5
  total_rtp_col: 6
  progressive_odds_col: 7

paytable:
  row_range: [66, 99]
  combo_cols: [1, 6]            # cols 1..5 (5 reels)
  pays_col: 8
  pph_col: 7
  rtp_pct_col: 9
  marker_col: 0
  # Note: scatter line at row 100 (combo: --,Bonus,Bonus,Bonus,--) is parsed
  # too — the engine doesn't special-case "--" placeholders.

symbol_counts:
  row_range: [128, 140]
  name_col: 1
  reel_col_range: [2, 7]

# W4.3a — per-reel strip parser (stripe layout)
#
# Layout (per IGT Fort Knox Wolf Run PAR_001/002, 0-indexed rows):
#   row 197: section hdr  ""  "Base Game Reel Strips"  ""  ""  ...
#   row 198: blank
#   row 199: col hdr       ""  Reel 1  Weights  Reel 2  Weights  ...  Reel 5  Weights
#   row 200..308: data     idx  sym1 w1  sym2 w2  sym3 w3  sym4 w4  sym5 w5
#   row 309: Total         ""  Total  R1tot  ""  R2tot  ""  R3tot  ""  R4tot  ""  R5tot
#
# So:  symbol_col_start=1, stride=2, index_col=0, total_col=1 (Total in col 1).
# Different reel lengths are normal (sparse cells past per-reel tail); the
# parser ignores blank symbol cells row-by-row.
#
# Bonus (FS) strips follow the same layout starting row 322 with section
# header `Bonus Reel Strips` in col 1 and data running 325..end.
reel_sets:
  base:
    layout: stripe
    header_substr: "Base Game Reel Strips"
    data_offset: 3
    reel_count: 5
    index_col: 0
    symbol_col_start: 1
    stride: 2
    total_label: "Total"
    total_col: 1
    max_stops: 200
  fs:
    layout: stripe
    header_substr: "Bonus Reel Strips"
    data_offset: 3
    reel_count: 5
    index_col: 0
    symbol_col_start: 1
    stride: 2
    total_label: "Total"
    total_col: 1
    max_stops: 200

features:
  - type: free_spins
    config:
      paytable_header_label: "Combination"
      paytable_header_col: 1
      combo_header_label: "Combination"
      combo_header_col: 1
      pays_substr: "Pays"
      combo_cols: [1, 6]
      pays_col: 8
      pph_col: 7
      rtp_pct_col: 9
      marker_col: 0
      max_rows: 60
      summary_header_substr: "Ave # Spins"
      summary_data_offset: 1
      summary_cols:
        avg_free_spins: 1
        single_spin_payback_pct: 2
        total_payback_pct: 3

  - type: linear_progressive
    config:
      progressive_odds_col: 7

  - type: fort_knox_pick_bonus
    config:
      section_label: "Fort Knox Bonus"
      section_label_col: 2
      rtp_label_col: 3
      rtp_value_col: 7
      max_search_rows: 800
      bet_table_fkb_rtp_col: 4

# W4.3b — Paylines block layout (Paylines sheet).
#
# Sheet `Paylines` (53 rows) ships 40 paylines in 8 blocks of 5 lines each.
# Per block: 1 label row + 4 data rows for a 4-row grid + 1 blank.
# B5 → B6 has a 7-row stride instead of 6 (page break in source PDF).
# Each line spans 5 consecutive reel cols, line stride = 6 cols.
paylines_layout:
  sheet: Paylines
  reels: 5
  marker: "X"
  blocks:
    - line_numbers: [1, 2, 3, 4, 5]
      data_row_range: [3, 6]
      col_start: 1
      cols_per_line: 6
    - line_numbers: [6, 7, 8, 9, 10]
      data_row_range: [9, 12]
      col_start: 1
      cols_per_line: 6
    - line_numbers: [11, 12, 13, 14, 15]
      data_row_range: [15, 18]
      col_start: 1
      cols_per_line: 6
    - line_numbers: [16, 17, 18, 19, 20]
      data_row_range: [21, 24]
      col_start: 1
      cols_per_line: 6
    - line_numbers: [21, 22, 23, 24, 25]
      data_row_range: [27, 30]
      col_start: 1
      cols_per_line: 6
    - line_numbers: [26, 27, 28, 29, 30]
      data_row_range: [34, 37]
      col_start: 1
      cols_per_line: 6
    - line_numbers: [31, 32, 33, 34, 35]
      data_row_range: [40, 43]
      col_start: 1
      cols_per_line: 6
    - line_numbers: [36, 37, 38, 39, 40]
      data_row_range: [46, 49]
      col_start: 1
      cols_per_line: 6
