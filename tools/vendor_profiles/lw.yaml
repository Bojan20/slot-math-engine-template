# L&W (Light & Wonder / Scientific Games) PAR sheet profile.
#
# Calibrated on: games/ce-copy-test/raw/PAR-001|002|003.tsv  (Cash Eruption clone)
# Profile version 1 covers: 5×3 reel · 20 payline · FS bonus · Cash Eruption feature.
#
# Future L&W games (Hold-and-Win, scattered hot zones) may extend or
# override coordinates by inheriting this base and shadowing keys.

vendor: lw
display_name: Light & Wonder
profile_version: 1
game_name: CE COPY TEST
based_on: Cash Eruption (exact paymodel copy)

sheets:
  main_par: PAR-001
  paylines: Paylines

dimensions:
  reels: 5
  rows: 3
  paylines: 20
  left_to_right_only: true

meta:
  swid:     { row: 2, col: 4 }
  hold:     { row: 0, col: 14 }
  hit_freq: { row: 1, col: 14 }
  win_freq: { row: 2, col: 14 }

rtp_breakdown:
  base_game:               { row: 67, col: 11 }
  cash_eruption_from_base: { row: 68, col: 11 }
  free_spins:              { row: 69, col: 11 }
  cash_eruption_from_fs:   { row: 70, col: 11 }
  total:                   { row: 71, col: 11 }

bet_table:
  row_range: [24, 45]
  mult_col: 11
  total_col: 12
  max_liab_col: 13

paytable:
  row_range: [24, 55]
  combo_cols: [2, 7]
  pays_col: 7
  pph_col: 8
  rtp_pct_col: 9
  marker_col: 1

symbol_counts:
  row_range: [7, 20]
  name_col: 2
  reel_col_range: [3, 8]

reel_sets:
  base:
    header_label: "Base Game Reel Set:"
    header_col: 1
    set_num_col: 3
    data_offset: 4
    reel_count: 5
    symbol_col_start: 2
    stride: 2
    index_col: 1
    total_label: Total
    max_stops: 200
  fs:
    header_label: "Free Spins Reel Set:"
    header_col: 1
    set_num_col: 3
    data_offset: 4
    reel_count: 5
    symbol_col_start: 2
    stride: 2
    index_col: 1
    total_label: Total
    max_stops: 200

reel_set_weights:
  base:
    row_range: [68, 104]
    set_col: 2
    weight_col: 3
    total_row: 104
    total_col: 3
    initial_set: { row: 104, col: 5 }
    initial_rtp: { row: 104, col: 6 }
  fs:
    header_substr: "Free Spins Reel Set Weights"
    data_offset: 3
    set_col: 2
    weight_col: 3
    total_label: Total
    max_rows: 60

paylines_layout:
  sheet: Paylines
  reels: 5
  marker: "X"
  blocks:
    - line_numbers: [1, 2, 3, 4, 5]
      data_row_range: [2, 5]
      col_start: 2
      cols_per_line: 5
    - line_numbers: [6, 7, 8, 9, 10]
      data_row_range: [6, 9]
      col_start: 2
      cols_per_line: 5
    - line_numbers: [11, 12, 13, 14, 15]
      data_row_range: [10, 13]
      col_start: 2
      cols_per_line: 5
    - line_numbers: [16, 17, 18, 19, 20]
      data_row_range: [14, 17]
      col_start: 2
      cols_per_line: 5

features:
  - type: free_spins
    config:
      paytable_header_label: "Free Spins Bonus"
      paytable_header_col: 2
      combo_header_label: "Combination"
      combo_header_col: 2
      pays_substr: "Pays"
      combo_cols: [2, 7]
      pays_col: 7
      pph_col: 8
      rtp_pct_col: 9
      marker_col: 1
      max_rows: 60
      summary_header_substr: "Bonus Summary"
      summary_data_offset: 3
      summary_cols:
        avg_free_spins: 2
        single_spin_payback_pct: 3
        total_payback_pct: 4
  - type: cash_eruption_pages
    config:
      page_pattern: 'BET MULTIPLIER\s+(\d+)'
      fireballs_set_label: "Fireballs Set"
      fireballs_set_label_col: 10
      fireballs_set_weight_col: 11
      pool_labels: [low, med, high]
      small_fireballs_label: "Small Fireballs"
      big_fireball_label: "Big Fireball"
      fireball_value_col: 10
      tier_label_col: 9
      fireball_low_col: 11
      fireball_med_col: 12
      fireball_high_col: 13
      respin_landed_col: 2
      respin_weight_cols: [3, 4, 5]
      ce_from_base_substr: "from the Base Game RTP"
      ce_from_fs_substr: "from the Free Spins Bonus RTP"
      ce_label_col: 3
      ce_value_col: 7
      grand_label: "GRAND"
      grand_label_col: 10
      grand_value_col: 10
      grand_prob_base_col: 11
      grand_prob_fs_col: 12
