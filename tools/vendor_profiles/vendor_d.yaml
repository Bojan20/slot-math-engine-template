# Vendor D — generic Cluster Pays + Avalanche layout profile.
#
# Topology: 7×7 grid (cluster), no paylines (cluster matching ≥ 5
# orthogonally-adjacent symbols). Distinguishing feature: Avalanche
# cascade (winning symbols removed, remaining cells fall down,
# new symbols filled from top reel-set strips, evaluation repeats).
#
# Used as scaffold for any real-world cluster-pays vendor with
# avalanche cascade. All coordinates are placeholders; this profile
# is intentionally generic and contains NO proprietary vendor math.

vendor: vendor_d
display_name: "Vendor D — Cluster Pays + Avalanche (generic)"
profile_version: 1

sheets:
  main_par: PAR-001
  paylines: ~

dimensions:
  reels: 7
  rows: 7
  paylines: cluster
  left_to_right_only: false
  min_cluster_size: 5

meta:
  swid:     { row: 2, col: 4 }
  hold:     { row: 0, col: 14 }
  hit_freq: { row: 1, col: 14 }
  win_freq: { row: 2, col: 14 }

rtp_breakdown:
  base_game:              { row: 60, col: 11 }
  cascade_chain:          { row: 61, col: 11 }
  free_spins:             { row: 62, col: 11 }
  cascade_in_fs:          { row: 63, col: 11 }
  total:                  { row: 64, col: 11 }

bet_table:
  row_range: [24, 45]
  mult_col: 11
  total_col: 12
  max_liab_col: 13

paytable:
  row_range: [24, 55]
  cluster_size_col: 2
  symbol_col: 3
  pays_col: 4
  pph_col: 5
  rtp_pct_col: 6
  marker_col: 1

symbol_counts:
  row_range: [7, 20]
  name_col: 2
  reel_col_range: [3, 10]

reel_sets:
  base:
    header_label: "Base Game Reel Set:"
    header_col: 1
    set_num_col: 3
    data_offset: 4
    reel_count: 7
    symbol_col_start: 2
    stride: 2
    index_col: 1
    total_label: Total
    max_stops: 200
  fs:
    header_label: "Free Spins Reel Set:"
    header_col: 1
    set_num_col: 3
    data_offset: 4
    reel_count: 7
    symbol_col_start: 2
    stride: 2
    index_col: 1
    total_label: Total
    max_stops: 200

reel_set_weights:
  base:
    row_range: [68, 104]
    set_col: 2
    weight_col: 3
    total_row: 104
    total_col: 3

features:
  - type: cascade
    config:
      header_label: "Cascade Chain"
      header_col: 1
      chain_length_col: 2
      multiplier_col: 3
      prob_col: 4
      max_chain_length: 12
      cascade_in_fs: true
  - type: free_spins
    config:
      paytable_header_label: "Free Spins Bonus"
      paytable_header_col: 2
      cluster_size_col: 2
      symbol_col: 3
      pays_col: 4
      pph_col: 5
      rtp_pct_col: 6
      marker_col: 1
      max_rows: 40
      summary_header_substr: "Bonus Summary"
      summary_data_offset: 3
      summary_cols:
        avg_free_spins: 2
        single_spin_payback_pct: 3
        total_payback_pct: 4
