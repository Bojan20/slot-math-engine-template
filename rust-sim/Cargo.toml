[package]
name = "slot_sim"
version = "1.0.0"
edition = "2021"
rust-version = "1.80"
description = "High-performance slot machine Monte Carlo simulator"
authors = ["Slot Math Engine"]
license = "MIT"

[dependencies]
# Parallel processing - latest stable
rayon = "1.11"

# CLI argument parsing - latest 4.x
clap = { version = "4.5", features = ["derive"] }

# JSON serialization - latest
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Progress bar - latest
indicatif = { version = "0.18", features = ["rayon"] }

# No external RNG needed - using Mulberry32 for TS compatibility

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 1

[profile.bench]
inherits = "release"
debug = true
