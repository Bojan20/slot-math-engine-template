# CORTI W206-SECURITY — TLS-enforcing SPA fallback (OWASP A02 remediation).
#
# Production deploys terminate TLS here:
#   - HTTP :80  → 301 redirect to HTTPS :443 (no plain-HTTP serving)
#   - HTTPS :443 → TLS 1.3-only (TLS 1.2 fallback as min_protocol gate)
#   - HSTS 1 year, includeSubDomains, preload
#   - Certificate paths default to Let's Encrypt mount points; override
#     via the docker-compose `secrets:` block or the `volumes:` mount.
#   - For local dev the entrypoint script generates a self-signed pair
#     at /etc/nginx/certs/dev.{crt,key} before nginx starts — search
#     for `generate-selfsigned.sh` in Dockerfile.{studio,operator,regulator}.

# 1) HTTP → HTTPS redirect
server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Allow Let's Encrypt HTTP-01 challenges to pass through unredirected.
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type text/plain;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# 2) HTTPS server (TLS 1.3 only)
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  # TLS 1.3 only. Disable obsolete protocols (SSLv3 / TLS 1.0–1.2) per
  # PCI-DSS 4.0 § 4.2.1 and NIST SP 800-52r2 § 3.1.
  ssl_protocols              TLSv1.3;
  ssl_prefer_server_ciphers  off;
  ssl_session_cache          shared:SSL:10m;
  ssl_session_timeout        1d;
  ssl_session_tickets        off;

  # OCSP stapling — protects against revoked-cert MITM.
  ssl_stapling           on;
  ssl_stapling_verify    on;
  resolver               1.1.1.1 8.8.8.8 valid=60s;
  resolver_timeout       5s;

  # Strict HSTS (matches Helmet defaults on the backend).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header X-Content-Type-Options    "nosniff" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

  root /usr/share/nginx/html;
  index index.html;

  # Cache hashed assets aggressively, never cache the HTML entry.
  location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|webp|avif|ico)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Backend proxy — docker-compose service name `server` resolves via
  # the user-defined bridge network. Override via env if needed.
  location /api/ {
    proxy_pass http://server:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
